name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
      next_version:
        description: "Next SNAPSHOT version (e.g. 1.3.0-SNAPSHOT)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set release version
        run: sed -i "s/^pluginVersion=.*/pluginVersion=${{ inputs.version }}/" gradle.properties

      - name: Run tests
        run: ./gradlew test

      - name: Build plugin
        run: ./gradlew build

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Commit release version and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "release: ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD
          git push origin "v${{ inputs.version }}"

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body_path: CHANGELOG.md
          files: build/distributions/ti-basic-plugin-${{ inputs.version }}.zip

      - name: Bump to next SNAPSHOT version
        run: |
          sed -i "s/^pluginVersion=.*/pluginVersion=${{ inputs.next_version }}/" gradle.properties
          git add gradle.properties
          git commit -m "chore: bump version to ${{ inputs.next_version }}"
          git push origin HEAD

